<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SteamUReady — Promos Steam × Compatibilité émulation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Progress bar -->
<div class="progress-bar" id="progressBar"></div>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <h1 class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z" fill="currentColor" opacity=".3"/>
        <path d="M6 7h12v2l-3 3 3 3v2H6v-2l3-3-3-3V7z" fill="currentColor"/>
      </svg>
      SteamUReady
    </h1>

    <div class="header-actions">
      <span class="cache-label" id="cacheLabel"></span>
      <div class="status-dot" id="statusDot" title="Status API"></div>
      <button class="btn-refresh" id="refreshBtn" title="Vider le cache et re-fetcher">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        Refresh
      </button>
    </div>
  </div>
</header>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar / Filters -->
  <aside class="sidebar">
    <div class="sidebar-title">Filtres</div>

    <!-- Device -->
    <div class="filter-group">
      <label class="filter-label">Appareil</label>
      <div class="device-combo" id="deviceCombo">
        <input type="text" id="deviceSearch" placeholder="Rechercher un appareil…" autocomplete="off" />
        <div class="device-dropdown" id="deviceDropdown" hidden></div>
        <div class="device-chips" id="deviceChips"></div>
      </div>
    </div>

    <!-- Compatibility -->
    <div class="filter-group">
      <label class="filter-label">Compatibilité minimale</label>
      <div class="compat-list" id="compatList">
        <!-- Generated by JS -->
        <label class="compat-item selected" data-value="">
          <input type="radio" name="compat" value="" checked />
          <span class="compat-dot dot-0"></span>
          <span class="compat-label-text">Toutes</span>
        </label>
      </div>
    </div>

    <!-- Price -->
    <div class="filter-group">
      <label class="filter-label">Prix maximum</label>
      <div class="price-row">
        <input type="number" id="minPrice" placeholder="0" min="0" step="1" style="width:72px" />
        <span class="price-sep">–</span>
        <input type="number" id="maxPrice" placeholder="∞" min="0" step="1" style="width:72px" />
        <span class="price-sep">$</span>
      </div>
    </div>

    <!-- Discount -->
    <div class="filter-group">
      <label class="filter-label">Réduction minimale</label>
      <div class="discount-buttons">
        <button class="disc-btn active" data-value="0">Toutes</button>
        <button class="disc-btn" data-value="25">≥25%</button>
        <button class="disc-btn" data-value="50">≥50%</button>
        <button class="disc-btn" data-value="75">≥75%</button>
        <button class="disc-btn" data-value="90">≥90%</button>
      </div>
    </div>

    <!-- Region -->
    <div class="filter-group">
      <label class="filter-label">Région Steam</label>
      <select id="regionSelect">
        <option value="us">🇺🇸 USD (États-Unis)</option>
      </select>
      <div class="region-note" id="regionNote"></div>
    </div>

    <!-- Search -->
    <div class="filter-group">
      <label class="filter-label">Rechercher</label>
      <input type="text" id="searchInput" placeholder="Nom du jeu…" />
    </div>

    <button class="btn-apply" id="applyBtn">🔍 Rechercher</button>
    <button class="btn-reset" id="resetBtn">Réinitialiser</button>
  </aside>

  <!-- Main -->
  <main class="main">
    <!-- Sort bar -->
    <div class="sort-bar">
      <span class="results-count" id="resultsCount">—</span>
      <select id="sortSelect">
        <option value="discount_desc">Réduction (↓)</option>
        <option value="price_asc">Prix (↑)</option>
        <option value="price_desc">Prix (↓)</option>
        <option value="compat_desc">Compatibilité (↓)</option>
        <option value="name_asc">Nom (A→Z)</option>
      </select>
    </div>

    <!-- Game grid -->
    <div class="games-grid" id="gamesGrid"></div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>
  </main>

</div>

<script src="app.js"></script>
</body>
</html>
