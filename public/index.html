<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>SteamUReady — Promos Steam × Compatibilité émulation</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Preferred Devices Modal -->
<div class="modal-overlay" id="prefDevicesModal" hidden>
  <div class="modal">
    <div class="modal-header">
      <h2 data-i18n="preferredDevicesTitle">Preferred Devices</h2>
    </div>
    <div class="modal-body">
      <p data-i18n="preferredDevicesMsg">Pick your devices to pre-filter results and speed up loading. You can skip this and change it anytime.</p>
      <div class="device-combo" id="prefDeviceCombo">
        <input type="text" id="prefDeviceSearch" data-i18n-placeholder="deviceSearchPlaceholder" placeholder="Search for a device…" autocomplete="off" />
        <div class="device-dropdown" id="prefDeviceDropdown" hidden></div>
        <div class="device-chips" id="prefDeviceChips"></div>
      </div>
      <div style="margin-top:1rem">
        <label class="filter-label" data-i18n="preferredCompatLabel">Minimum compatibility</label>
        <select id="prefCompatSelect" style="width:100%;margin-top:.35rem">
          <!-- populated by JS -->
        </select>
      </div>
    </div>
    <div class="modal-footer">
      <button class="btn-modal-skip" id="prefDevicesSkip" data-i18n="preferredDevicesSkip">Skip</button>
      <button class="btn-modal-save" id="prefDevicesSave" data-i18n="preferredDevicesSave">Save</button>
    </div>
  </div>
</div>

<!-- Progress bar -->
<div class="progress-bar" id="progressBar"></div>

<!-- Header -->
<header class="header">
  <div class="header-inner">
    <h1 class="logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 14H9V8h2v8zm4 0h-2V8h2v8z" fill="currentColor" opacity=".3"/>
        <path d="M6 7h12v2l-3 3 3 3v2H6v-2l3-3-3-3V7z" fill="currentColor"/>
      </svg>
      SteamUReady
    </h1>

    <div class="header-actions">
      <span class="cache-label" id="cacheLabel"></span>
      <div class="status-dot" id="statusDot" data-i18n-title="statusApi"></div>
      <div class="lang-switcher">
        <button class="lang-btn" data-lang="fr" onclick="setLang('fr')">FR</button>
        <button class="lang-btn" data-lang="en" onclick="setLang('en')">EN</button>
        <button class="lang-btn" data-lang="es" onclick="setLang('es')">ES</button>
      </div>
      <button class="btn-refresh" id="refreshBtn" data-i18n-title="refreshTitle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10"></polyline>
          <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"></path>
        </svg>
        <span data-i18n="refresh">Refresh</span>
      </button>
    </div>
  </div>
</header>

<!-- Layout -->
<div class="layout">

  <!-- Sidebar / Filters -->
  <aside class="sidebar">
    <div class="sidebar-title" data-i18n="filters">Filters</div>

    <!-- Device -->
    <div class="filter-group">
      <label class="filter-label" data-i18n="device">Device</label>
      <div class="device-combo" id="deviceCombo">
        <input type="text" id="deviceSearch" data-i18n-placeholder="deviceSearchPlaceholder" placeholder="Search for a device…" autocomplete="off" />
        <div class="device-dropdown" id="deviceDropdown" hidden></div>
        <div class="device-chips" id="deviceChips"></div>
      </div>
      <button class="link-btn" id="managePreferredBtn" data-i18n="preferredDevicesManage">Manage preferred devices</button>
    </div>

    <!-- Compatibility -->
    <div class="filter-group">
      <label class="filter-label" data-i18n="compatMin">Minimum compatibility</label>
      <div class="compat-list" id="compatList">
        <!-- Generated by JS -->
        <label class="compat-item selected" data-value="">
          <input type="radio" name="compat" value="" checked />
          <span class="compat-dot dot-0"></span>
          <span class="compat-label-text" data-i18n="compatAll">All</span>
        </label>
      </div>
    </div>

    <!-- Price -->
    <div class="filter-group">
      <label class="filter-label" data-i18n="priceMax">Maximum price</label>
      <div class="price-row">
        <input type="number" id="minPrice" placeholder="0" min="0" step="1" style="width:72px" />
        <span class="price-sep">–</span>
        <input type="number" id="maxPrice" placeholder="∞" min="0" step="1" style="width:72px" />
        <span class="price-sep">$</span>
      </div>
    </div>

    <!-- Discount -->
    <div class="filter-group">
      <label class="filter-label" data-i18n="discountMin">Minimum discount</label>
      <div class="discount-buttons">
        <button class="disc-btn active" data-value="0" data-i18n="discountAll">All</button>
        <button class="disc-btn" data-value="25">≥25%</button>
        <button class="disc-btn" data-value="50">≥50%</button>
        <button class="disc-btn" data-value="75">≥75%</button>
        <button class="disc-btn" data-value="90">≥90%</button>
      </div>
    </div>

    <!-- Stores -->
    <div class="filter-group">
      <label class="filter-label" data-i18n="storeFilter">Stores</label>
      <div class="store-list" id="storeList">
        <!-- Generated by JS -->
      </div>
    </div>

    <!-- Region -->
    <div class="filter-group">
      <label class="filter-label" data-i18n="steamRegion">Steam region</label>
      <select id="regionSelect">
        <option value="us">🇺🇸 USD (États-Unis)</option>
      </select>
      <div class="region-note" id="regionNote"></div>
    </div>

    <!-- Historical Low -->
    <div class="filter-group">
      <label class="filter-checkbox">
        <input type="checkbox" id="histLowCheck" />
        <span data-i18n="histLowFilter">Historical low only</span>
      </label>
    </div>

    <!-- Search -->
    <div class="filter-group">
      <label class="filter-label" data-i18n="searchLabel">Search</label>
      <input type="text" id="searchInput" data-i18n-placeholder="searchPlaceholder" placeholder="Game name…" />
    </div>

    <button class="btn-apply" id="applyBtn" data-i18n="applyBtn">🔍 Search</button>
    <button class="btn-reset" id="resetBtn" data-i18n="resetBtn">Reset</button>
  </aside>

  <!-- Main -->
  <main class="main">
    <!-- Sort bar -->
    <div class="sort-bar">
      <span class="results-count" id="resultsCount">—</span>
      <select id="sortSelect">
        <option value="discount_desc" data-i18n="sortDiscount">Discount (↓)</option>
        <option value="price_asc"     data-i18n="sortPriceAsc">Price (↑)</option>
        <option value="price_desc"    data-i18n="sortPriceDesc">Price (↓)</option>
        <option value="compat_desc"   data-i18n="sortCompat">Compatibility (↓)</option>
        <option value="name_asc"      data-i18n="sortName">Name (A→Z)</option>
      </select>
    </div>

    <!-- Game grid -->
    <div class="games-grid" id="gamesGrid"></div>

    <!-- Pagination -->
    <div class="pagination" id="pagination"></div>
  </main>

</div>

<footer class="attribution">
  Compatibility data from <a href="https://emuready.com" target="_blank" rel="noopener">EmuReady</a> ·
  Prices provided by <a href="https://isthereanydeal.com" target="_blank" rel="noopener">IsThereAnyDeal</a>
</footer>

<script src="i18n.js"></script>
<script src="app.js"></script>
</body>
</html>
